$kind: http-request
url: "{{BASE_URL}}/api/productos/1?Accept=application/json"
method: GET
queryParams:
  Accept: application/json
scripts:
  - type: afterResponse
    code: "pm.test(\"Status 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Respuesta es JSON\", function () {\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      pm.test(\"Tiene ID\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.id).to.eql(1);\r

      });"
    language: text/javascript
order: 3000
