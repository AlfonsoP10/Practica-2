$kind: http-request
url: "{{BASE_URL}}/api/productos?Accept=application/json&Content-Type=application/json"
method: POST
queryParams:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \    \"nombre\": \"Laptop HP 15\",\r

    \    \"descripcion\": \"Laptop 15 pulgadas Intel i5\",\r

    \    \"precio\": 12500.00,\r

    \    \"stock\": 10\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(\"Respuesta es JSON\", function () {\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      pm.test(\"Producto creado\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.nombre).to.eql(\"Laptop HP 15\");\r

      });"
    language: text/javascript
order: 2000
